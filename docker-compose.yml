services:
  carbonpanel:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      APP_PORT: ${APP_PORT:-8787}
    volumes:
      - ./backend/carbonpanel.db:/app/carbonpanel.db
    restart: unless-stopped
    network_mode: host   # required for psutil to see host network interfaces
